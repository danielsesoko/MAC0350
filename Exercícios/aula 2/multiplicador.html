<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplicador</title>
</head>
    <h1>2</h1>

    <button onclick="dobra()">Dobrar</button>

    <script>
        let valor = 2;

        function dobra() {
            const texto = document.querySelector('h1')  
            valor = valor * 2
            texto.innerHTML = valor 
        }
    </script>
</html>
