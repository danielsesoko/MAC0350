<input type="text"  
       placeholder="Buscar aluno..."
       hx-get="/lista"
       hx-target="main"
       hx-trigger="input changed delay:500ms"
       hx-push-url="true"
       name="busca"
       value="{{ busca }}">

<div id="lista"><br>
    <ul>
        {% for aluno in alunos %}
            <li>{{ aluno.id }} - {{ aluno.nome }}</li>
        {% else %}
            <li>Nenhum aluno encontrado.</li>
        {% endfor %}
    </ul>

    <hr>

    <nav>
        {% if page > 1 %}
            <button hx-get="/lista?busca={{ busca }}&page={{ page - 1 }}"
                    hx-target="main"
                    hx-push-url="true">
                Anterior
            </button>
        {% endif %}

        <span>Página {{ page }}</span>

        {% if tem_proxima %}
            <button hx-get="/lista?busca={{ busca }}&page={{ page + 1 }}"
                    hx-target="main"
                    hx-push-url="true">
                Próximo
            </button>
        {% endif %}
    </nav>
</div>
